<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الأسماء السرية</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="signalCanvas" aria-hidden="true"></canvas>
  <main class="game-shell">
    <section class="topbar" aria-label="أدوات اللعبة">
      <div>
        <p class="eyebrow">الأسماء السرية</p>
        <h1>لوحة الميدان</h1>
      </div>
      <div class="topbar-actions">
        <button class="icon-button" id="newGameButton" type="button" title="لعبة جديدة" aria-label="لعبة جديدة">
          <span aria-hidden="true">ج</span>
        </button>
        <button class="icon-button" id="spymasterButton" type="button" title="إظهار أو إخفاء خريطة الجاسوس" aria-label="إظهار أو إخفاء خريطة الجاسوس" aria-pressed="false">
          <span aria-hidden="true">س</span>
        </button>
      </div>
    </section>

    <section class="score-strip" aria-label="لوحة النتائج">
      <article class="team-panel red" id="redPanel">
        <div>
          <span>الأحمر</span>
          <strong id="redRemaining">0</strong>
        </div>
        <small>متبقون</small>
      </article>
      <article class="turn-panel" aria-live="polite">
        <span id="turnLabel">دور الأحمر</span>
        <strong id="turnCount">0 محاولات متبقية</strong>
      </article>
      <article class="team-panel blue" id="bluePanel">
        <div>
          <span>الأزرق</span>
          <strong id="blueRemaining">0</strong>
        </div>
        <small>متبقون</small>
      </article>
    </section>

    <section class="play-area">
      <form class="clue-bar" id="clueForm" autocomplete="off">
        <label>
          <span>التلميح</span>
          <input id="clueInput" type="text" maxlength="24" placeholder="قمر" spellcheck="false">
        </label>
        <label>
          <span>العدد</span>
          <input id="countInput" type="number" min="1" max="9" value="1">
        </label>
        <button type="submit">تثبيت التلميح</button>
        <button id="passButton" type="button">تمرير</button>
      </form>

      <section class="current-clue" aria-live="polite">
        <span>التلميح الحالي</span>
        <strong id="currentClue">لا يوجد</strong>
      </section>

      <section class="board" id="board" aria-label="لوحة الأسماء السرية"></section>
    </section>

    <section class="event-log" aria-label="سجل اللعبة">
      <div class="event-log-head">
        <span>السجل</span>
        <button class="text-button" id="clearLogButton" type="button">مسح</button>
      </div>
      <ol id="logList"></ol>
    </section>
  </main>

  <dialog id="gameDialog">
    <div class="dialog-content">
      <p class="eyebrow" id="dialogKicker">انتهت اللعبة</p>
      <h2 id="dialogTitle">فاز الأحمر</h2>
      <p id="dialogMessage">تم العثور على كل العملاء.</p>
      <form method="dialog">
        <button id="dialogCloseButton" type="submit">إغلاق</button>
        <button id="dialogNewGameButton" type="button">لعبة جديدة</button>
      </form>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
